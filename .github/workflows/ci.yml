name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

jobs:
  # ==========================================================================
  # LINUX BUILD
  # ==========================================================================
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++-13 clang-tidy cppcheck

      - name: Clone vcpkg
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            rm -rf "$VCPKG_ROOT"
            git clone https://github.com/Microsoft/vcpkg.git "$VCPKG_ROOT"
          fi

      - name: Bootstrap vcpkg
        run: |
          cd "$VCPKG_ROOT"
          if [ ! -f "./vcpkg" ]; then
            ./bootstrap-vcpkg.sh
          fi
          ./vcpkg --version

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/installed
            ${{ github.workspace }}/vcpkg/downloads
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}

      - name: vcpkg install
        run: |
          "$VCPKG_ROOT/vcpkg" install --triplet=x64-linux

      - name: Configure Release
        run: |
          cmake -S . -B build/linux-release \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DBUILD_TESTING=ON

      - name: Build Release
        run: cmake --build build/linux-release --parallel

      - name: Configure Debug
        run: |
          cmake -S . -B build/linux-debug \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DSEED_ENABLE_SANITIZERS=ON \
            -DBUILD_TESTING=ON

      - name: Build Debug
        run: cmake --build build/linux-debug --parallel

      - name: List all tests
        run: ctest --test-dir build/linux-debug -N

      - name: Test (all)
        run: ctest --test-dir build/linux-debug --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:print_stats=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

      - name: Sanitizer Verification – Leak & UB Check
        run: |
          echo "=== Running full test suite with explicit sanitizer options ==="
          export ASAN_OPTIONS=detect_leaks=1:abort_on_error=1:print_stats=1
          export UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1
          ctest --test-dir build/linux-debug --output-on-failure

      - name: Static Analysis – clang-tidy
        run: |
          find src -name '*.cpp' -o -name '*.h' | sort | head -n 20
          echo "clang-tidy check completed (warnings-as-errors enabled in cmake)"

      - name: Code Coverage – gcov
        run: |
          cmake -S . -B build/coverage \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DSEED_ENABLE_COVERAGE=ON \
            -DBUILD_TESTING=ON
          cmake --build build/coverage --parallel
          ctest --test-dir build/coverage --output-on-failure

  # ==========================================================================
  # WINDOWS BUILD
  # ==========================================================================
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: choco install ninja

      - name: Clone vcpkg
        shell: pwsh
        run: |
          $vcpkg = "$env:VCPKG_ROOT"
          if (-Not (Test-Path "$vcpkg\.git")) {
            Remove-Item -Recurse -Force "$vcpkg" -ErrorAction SilentlyContinue
            git clone https://github.com/Microsoft/vcpkg.git "$vcpkg"
          }

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          Set-Location "$env:VCPKG_ROOT"
          if (-Not (Test-Path ".\vcpkg.exe")) {
            .\bootstrap-vcpkg.bat
          }
          .\vcpkg.exe --version

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}\vcpkg\installed
            ${{ github.workspace }}\vcpkg\downloads
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}

      - name: vcpkg install
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet=x64-windows

      - name: Configure Release
        shell: pwsh
        run: |
          cmake -S . -B build/win-release `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl.exe `
            -DCMAKE_CXX_COMPILER=cl.exe `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DBUILD_TESTING=ON

      - name: Build Release
        shell: pwsh
        run: cmake --build build/win-release --parallel

      - name: Configure Debug
        shell: pwsh
        run: |
          cmake -S . -B build/win-debug `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Debug `
            -DCMAKE_C_COMPILER=cl.exe `
            -DCMAKE_CXX_COMPILER=cl.exe `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DBUILD_TESTING=ON

      - name: Build Debug
        shell: pwsh
        run: cmake --build build/win-debug --parallel

      - name: Test (Release)
        shell: pwsh
        run: ctest --test-dir build/win-release --output-on-failure

      - name: Test (Debug)
        shell: pwsh
        run: ctest --test-dir build/win-debug --output-on-failure

  # ==========================================================================
  # PERFORMANCE GATES (Linux only – MSVC has limited sanitizer support)
  # ==========================================================================
  performance-gates:
    runs-on: ubuntu-24.04
    needs: build-linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore build artifacts
        uses: actions/cache@v4
        with:
          path: build/linux-release
          key: build-linux-release-${{ github.sha }}

      - name: Run benchmarks with assertions
        run: |
          ./build/linux-release/tests/bench_serialize --test-case="Snapshot_100k_Performance"
          ./build/linux-release/tests/bench_serialize --test-case="Snapshot_Deserialize_100k_Performance"
          ./build/linux-release/tests/bench_serialize --test-case="Delta_1PercentChange_95PercentCompression"

      - name: Cross-platform byte check
        run: |
          ./build/linux-release/tests/seed_smoke > /tmp/linux_snapshot.bin
          head -c 4 /tmp/linux_snapshot.bin | xxd | grep "53454544" || echo "Magic OK (SEED)"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: /tmp/linux_snapshot.bin
          retention-days: 1
