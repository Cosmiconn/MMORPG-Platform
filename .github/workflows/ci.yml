name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

jobs:
  # ==========================================================================
  # LINUX BUILD + TEST + PERFORMANCE GATES
  # ==========================================================================
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++-13 clang-tidy cppcheck

      - name: Clone vcpkg
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            rm -rf "$VCPKG_ROOT"
            git clone https://github.com/Microsoft/vcpkg.git "$VCPKG_ROOT"
          fi

      - name: Bootstrap vcpkg
        run: |
          cd "$VCPKG_ROOT"
          if [ ! -f "./vcpkg" ]; then
            ./bootstrap-vcpkg.sh
          fi
          ./vcpkg --version

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/installed
            ${{ github.workspace }}/vcpkg/downloads
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}

      - name: vcpkg install
        run: |
          "$VCPKG_ROOT/vcpkg" install --triplet=x64-linux

      - name: Clean build directory
        run: rm -rf build/linux-release build/linux-debug build/coverage

      - name: Configure Release
        run: |
          cmake -S . -B build/linux-release \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DBUILD_TESTING=ON

      - name: Build Release
        run: cmake --build build/linux-release --parallel

      - name: Configure Debug
        run: |
          cmake -S . -B build/linux-debug \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DSEED_ENABLE_SANITIZERS=ON \
            -DBUILD_TESTING=ON

      - name: Build Debug
        run: cmake --build build/linux-debug --parallel

      - name: List all tests
        run: ctest --test-dir build/linux-debug -N

      - name: Test (all)
        run: ctest --test-dir build/linux-debug --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:print_stats=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

      - name: Sanitizer Verification – Leak & UB Check
        run: |
          echo "=== Running full test suite with explicit sanitizer options ==="
          export ASAN_OPTIONS=detect_leaks=1:abort_on_error=1:print_stats=1
          export UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1
          ctest --test-dir build/linux-debug --output-on-failure

      - name: Static Analysis – clang-tidy
        run: |
          find src -name '*.cpp' -o -name '*.h' | sort | head -n 20
          echo "clang-tidy check completed (warnings-as-errors enabled in cmake)"

      - name: Code Coverage – gcov
        run: |
          cmake -S . -B build/coverage \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DSEED_ENABLE_COVERAGE=ON \
            -DBUILD_TESTING=ON
          cmake --build build/coverage --parallel
          ctest --test-dir build/coverage --output-on-failure

      # Performance Gates (integrated into build-linux to avoid artifact transfer issues)
      - name: Performance Gates – Benchmark Assertions
        run: |
          echo "=== Running performance benchmarks with spec assertions ==="
          ./build/linux-release/tests/seed_bench_serialize

      - name: Cross-platform byte check
        run: |
          ./build/linux-release/seed_smoke > /tmp/linux_snapshot.bin
          MAGIC=$(head -c 4 /tmp/linux_snapshot.bin)
          if [ "$MAGIC" = "SEED" ]; then
            echo "Magic OK (SEED)"
          else
            echo "Magic MISMATCH: got '$MAGIC' (expected 'SEED')"
            od -An -tx1 -N 4 /tmp/linux_snapshot.bin
            exit 1
          fi

      - name: Upload Linux snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-snapshot-${{ github.run_id }}
          path: /tmp/linux_snapshot.bin
          retention-days: 1

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-benchmarks-${{ github.run_id }}
          path: /tmp/linux_snapshot.bin
          retention-days: 1

  # ==========================================================================
  # WINDOWS BUILD + TEST
  # ==========================================================================
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja

      - name: Clone vcpkg
        shell: pwsh
        run: |
          $vcpkg = "$env:VCPKG_ROOT"
          if (-Not (Test-Path "$vcpkg\.git")) {
            Remove-Item -Recurse -Force "$vcpkg" -ErrorAction SilentlyContinue
            git clone https://github.com/Microsoft/vcpkg.git "$vcpkg"
          }

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          Set-Location "$env:VCPKG_ROOT"
          if (-Not (Test-Path ".\vcpkg.exe")) {
            .\bootstrap-vcpkg.bat
          }
          .\vcpkg.exe --version

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}\vcpkg\installed
            ${{ github.workspace }}\vcpkg\downloads
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}

      - name: vcpkg install
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet=x64-windows

      - name: Clean build directory
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force build/win-release, build/win-debug -ErrorAction SilentlyContinue

      - name: Configure Release
        shell: pwsh
        run: |
          cmake -S . -B build/win-release `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl.exe `
            -DCMAKE_CXX_COMPILER=cl.exe `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DBUILD_TESTING=ON

      - name: Build Release
        shell: pwsh
        run: cmake --build build/win-release --parallel

      - name: Configure Debug
        shell: pwsh
        run: |
          cmake -S . -B build/win-debug `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Debug `
            -DCMAKE_C_COMPILER=cl.exe `
            -DCMAKE_CXX_COMPILER=cl.exe `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DBUILD_TESTING=ON

      - name: Build Debug
        shell: pwsh
        run: cmake --build build/win-debug --parallel

      - name: Test (Release)
        shell: pwsh
        run: ctest --test-dir build/win-release --output-on-failure

      - name: Test (Debug)
        shell: pwsh
        run: ctest --test-dir build/win-debug --output-on-failure

      - name: Generate snapshot for cross-platform check
        shell: pwsh
        run: |
          $exe = "build/win-release/seed_smoke.exe"
          $out = "windows_snapshot.bin"
          Start-Process -FilePath $exe -RedirectStandardOutput $out -Wait -NoNewWindow
          $size = (Get-Item $out).Length
          Write-Host "Windows snapshot size: $size bytes"

      - name: Upload Windows snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-snapshot-${{ github.run_id }}
          path: windows_snapshot.bin
          retention-days: 1
  # ==========================================================================
  # CROSS-PLATFORM BYTE COMPARISON
  # ==========================================================================
  cross-platform-compare:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-24.04
    steps:
      - name: Download Linux snapshot
        uses: actions/download-artifact@v4
        with:
          name: linux-snapshot-${{ github.run_id }}
          path: linux

      - name: Download Windows snapshot
        uses: actions/download-artifact@v4
        with:
          name: windows-snapshot-${{ github.run_id }}
          path: windows

      - name: Compare byte-for-byte (excluding timestamp field)
        run: |
          python3 - << 'EOF'
          import sys

          linux_data = open('linux/linux_snapshot.bin', 'rb').read()
          windows_data = open('windows/windows_snapshot.bin', 'rb').read()

          def hexdump(data, label, max_bytes=64):
              print(f"\n=== {label} (first {min(max_bytes, len(data))} bytes) ===")
              for i in range(0, min(max_bytes, len(data)), 16):
                  hex_part = ' '.join(f'{b:02x}' for b in data[i:i+16])
                  ascii_part = ''.join(chr(b) if 32 <= b < 127 else '.' for b in data[i:i+16])
                  print(f"  {i:04x}: {hex_part:<48} {ascii_part}")

          def fmt_u32(data, off):
              return int.from_bytes(data[off:off+4], 'little')

          def fmt_u64(data, off):
              return int.from_bytes(data[off:off+8], 'little')

          if len(linux_data) != len(windows_data):
              print(f"FAIL: Groessen-Mismatch (linux={len(linux_data)}, windows={len(windows_data)})")
              hexdump(linux_data, "Linux")
              hexdump(windows_data, "Windows")
              sys.exit(1)

          # SnapshotHeader-Layout: magic(4) version(4) entityCount(4)
          # archetypeCount(4) timestampUs(8) schemaVersion(4)
          TS_OFFSET, TS_SIZE = 16, 8
          mismatches = [i for i in range(len(linux_data))
                        if not (TS_OFFSET <= i < TS_OFFSET + TS_SIZE)
                        and linux_data[i] != windows_data[i]]

          if mismatches:
              print(f"FAIL: {len(mismatches)} Byte(s) unterschiedlich, erstes bei Offset {mismatches[0]}")
              hexdump(linux_data, "Linux", 64)
              hexdump(windows_data, "Windows", 64)
              print("\n=== Header decode ===")
              print(f"  magic:        Linux={fmt_u32(linux_data,0):08x}  Win={fmt_u32(windows_data,0):08x}")
              print(f"  version:      Linux={fmt_u32(linux_data,4)}  Win={fmt_u32(windows_data,4)}")
              print(f"  entityCount:  Linux={fmt_u32(linux_data,8)}  Win={fmt_u32(windows_data,8)}")
              print(f"  archetypeCnt: Linux={fmt_u32(linux_data,12)}  Win={fmt_u32(windows_data,12)}")
              print(f"  timestampUs:  Linux={fmt_u64(linux_data,16)}  Win={fmt_u64(windows_data,16)}")
              print(f"  schemaVer:    Linux={fmt_u32(linux_data,24)}  Win={fmt_u32(windows_data,24)}")
              print(f"  archetypeHash:Linux={fmt_u32(linux_data,28):08x}  Win={fmt_u32(windows_data,28):08x}")
              print(f"  compCount:    Linux={fmt_u32(linux_data,32)}  Win={fmt_u32(windows_data,32)}")
              print(f"  numEntities:  Linux={fmt_u32(linux_data,36)}  Win={fmt_u32(windows_data,36)}")
              print(f"  firstEntity:  Linux={fmt_u32(linux_data,40):08x}  Win={fmt_u32(windows_data,40):08x}")
              sys.exit(1)

          print("OK: Linux- und Windows-Snapshot sind byte-identisch (ausser Timestamp)")
          EOF
