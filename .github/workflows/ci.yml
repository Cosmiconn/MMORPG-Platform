name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

jobs:
  # ==========================================================================
  # LINUX BUILD
  # ==========================================================================
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++-13 clang-tidy cppcheck

      # FIX: Full clone instead of --depth 1 for baseline commit resolution
      - name: Clone vcpkg
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            rm -rf "$VCPKG_ROOT"
            git clone https://github.com/Microsoft/vcpkg.git "$VCPKG_ROOT"
          fi

      - name: Bootstrap vcpkg
        run: |
          cd "$VCPKG_ROOT"
          if [ ! -f "./vcpkg" ]; then
            ./bootstrap-vcpkg.sh
          fi
          ./vcpkg --version

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/installed
            ${{ github.workspace }}/vcpkg/downloads
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}

      - name: vcpkg install
        run: |
          "$VCPKG_ROOT/vcpkg" install --triplet=x64-linux

      - name: Verify vcpkg packages
        run: |
          "$VCPKG_ROOT/vcpkg" list

      - name: Configure Release
        run: |
          cmake -S . -B build/linux-release \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DBUILD_TESTING=ON

      - name: Build Release
        run: cmake --build build/linux-release --parallel

      - name: Configure Debug
        run: |
          cmake -S . -B build/linux-debug \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DSEED_ENABLE_SANITIZERS=ON \
            -DBUILD_TESTING=ON

      - name: Build Debug
        run: cmake --build build/linux-debug --parallel

      - name: Test
        run: ctest --test-dir build/linux-debug --output-on-failure

      - name: Static Analysis
        run: |
          find src tests -name '*.cpp' -exec clang-tidy {} \; || true
          cppcheck --enable=all --error-exitcode=0 --suppress=missingIncludeSystem src/ tests/ || true

  # ==========================================================================
  # WINDOWS BUILD
  # ==========================================================================
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone vcpkg
        shell: pwsh
        run: |
          $vcpkgPath = "$env:VCPKG_ROOT"
          if (-not (Test-Path "$vcpkgPath/.git")) {
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $vcpkgPath
            git clone https://github.com/Microsoft/vcpkg.git $vcpkgPath
          }

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          cd "$env:VCPKG_ROOT"
          if (-not (Test-Path "vcpkg.exe")) {
            .\bootstrap-vcpkg.bat
          }
          .\vcpkg.exe --version

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/installed
            ${{ github.workspace }}/vcpkg/downloads
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}

      - name: vcpkg install
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" install --triplet=x64-windows

      - name: Verify vcpkg packages
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" list

      - name: Configure Release
        shell: pwsh
        run: |
          $toolchain = "$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake -S . -B build/windows-release `
            -G "Ninja Multi-Config" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DBUILD_TESTING=ON

      - name: Build Release
        run: cmake --build build/windows-release --config Release --parallel

      - name: Configure Debug
        shell: pwsh
        run: |
          $toolchain = "$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake -S . -B build/windows-debug `
            -G "Ninja Multi-Config" `
            -DCMAKE_BUILD_TYPE=Debug `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DSEED_ENABLE_SANITIZERS=ON `
            -DBUILD_TESTING=ON

      - name: Build Debug
        run: cmake --build build/windows-debug --config Debug --parallel

      - name: Test
        run: ctest --test-dir build/windows-debug -C Debug --output-on-failure

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TheSeed-Windows
          path: |
            build/windows-release/Release/*.exe
            build/windows-release/Release/*.dll
